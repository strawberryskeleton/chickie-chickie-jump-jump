<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chickie Chickie Jump Jump</title>
    <link rel="stylesheet" href="./style.css">
    <script src="./main.js" defer></script>
</head>
<body>
    <!-- HEADER -->
    <header>
        <div class="logo">
            <h2>Chickie Chikie Jump Jump</h2>
        </div>

        <div class="score">
            Score:  <span id="score">000</span>
        </div>
    </header>

    <!-- MAIN GAME -->
    <main>
        <div id="start-screen" class="hidden">
            Press any key to start! Spacebar to jump!
        </div>

        <img src="./assets/chickie.png" alt="Chickie" id="chickie">
        <img src="./assets/egg.png" alt="Egg" id="egg">

        <div id="end-screen" class="hidden">
            Game Over! Press any key to restart!
        </div>
    </main>
</body>
</html>
