<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chickie Chickie Jump Jump</title>
    <link rel="stylesheet" href="./style.css">
    <script src="./main.js" defer></script>
</head>
<body>
    <!-- <div id="bg-div" class="bg-moving">
        <img src="./assets/bg.png" alt="Background" class="bg1">
        <img src="./assets/bg.png" alt="Background" class="bg2">
    </div> -->
    <!-- HEADER -->
    <header>
        <div class="logo">
            <h2>Chickie Chickie Jump Jump</h2>
        </div>

        <div class="score">
            High Score:  <span id="high-score">0000</span>
            <br>
            Score:  <span id="score">0000</span>
        </div>
    </header>

    <!-- MAIN GAME -->
    <main>
        <div id="bg-div" class=""></div>
        <div id="cloud-div" class="">
            <img src="./assets/cloud1.png" alt="Cloud" id="cloud">
        </div>

        <div id="start-screen" class="">
            Press any key to start! Spacebar to jump!
        </div>

        <img src="./assets/chickie.png" alt="Chickie" id="chickie">
        <img src="./assets/egg.png" alt="Egg" id="egg">

        <div id="end-screen" class="hidden">
            Game Over! Press any key to restart!
        </div>
    </main>
</body>
</html>
